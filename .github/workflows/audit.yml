name: Audit (health + smoke + E2E)

on:
  # Triggered by Vercel deployment webhook (repository_dispatch event_type = "vercel.deployment.succeeded")
  repository_dispatch:
    types: [vercel.deployment.succeeded, audit.manual]
  # Scheduled runs in production
  schedule:
    # Full audit — 2x/day: 8am ET (start of day) + 8pm ET (late-night bugs)
    - cron: '0 12 * * *'     # 12:00 UTC = 8am ET
    - cron: '0 0 * * *'      # 00:00 UTC = 8pm ET
    # Daily email digest — 10am ET, one consolidated email if anything failed
    - cron: '0 14 * * *'     # 14:00 UTC = 10am ET
  workflow_dispatch:          # manual "Run workflow" button

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: false   # never cancel an in-flight audit run

jobs:
  # ---- Daily digest (runs only on the 14:00 cron) ---------------------------
  digest:
    if: github.event.schedule == '0 14 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Send daily digest email
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          AUDIT_DIGEST_FROM: ${{ secrets.AUDIT_DIGEST_FROM }}
          AUDIT_DIGEST_TO: ${{ secrets.AUDIT_DIGEST_TO }}
        run: npx tsx scripts/audit-digest.ts

  # ---- Full audit run (deploy / manual / 3x-daily cron) --------------------
  audit:
    # Skip this job when the trigger is the 14:00 digest cron
    if: github.event.schedule != '0 14 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      # Layer 0 — health check. If /api/health is down, skip rest (noise floor).
      - name: Health probe
        id: health
        run: |
          code=$(curl -s -o /tmp/health.json -w "%{http_code}" https://app.pitcht.us/api/health)
          echo "http_code=$code" >> "$GITHUB_OUTPUT"
          cat /tmp/health.json || true
          if [ "$code" != "200" ]; then
            echo "::warning::health endpoint returned $code — skipping remaining stages"
            exit 1
          fi

      # Layer 1 — API smoke. Uses the existing test harness against prod.
      - name: API smoke test
        if: steps.health.outcome == 'success'
        env:
          BASE_URL: https://app.pitcht.us
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx tsx scripts/smoke-test.ts

      # Layer 2 — Playwright journey + Claude evaluator.
      - name: Install Playwright browsers
        if: steps.health.outcome == 'success'
        run: npx playwright install --with-deps chromium

      - name: Determine pooled account index
        if: steps.health.outcome == 'success'
        id: pool
        run: |
          # 5-account pool round-robin based on run number
          idx=$(( ${{ github.run_number }} % 5 ))
          echo "run_index=$idx" >> "$GITHUB_OUTPUT"

      - name: Playwright E2E audit
        id: e2e
        if: steps.health.outcome == 'success'
        # WARN-ONLY GATE (2026-04-22): the audit agent was just hardened with
        # DB-level assertions (see scripts/audit-db-assertions.ts). We're
        # letting it run for ~1 week against real deploys to build a baseline
        # of signal-to-noise before making it blocking. TODO(ops): flip
        # continue-on-error to false once we've seen 7+ consecutive green
        # runs across the pool. Failures still surface via the digest email,
        # the audit_runs table, and the GH step summary below.
        continue-on-error: true
        env:
          AUDIT_BASE_URL: https://app.pitcht.us
          AUDIT_RUN_INDEX: ${{ steps.pool.outputs.run_index }}
          AUDIT_TRIGGER: ${{ github.event_name == 'repository_dispatch' && 'deploy' || (github.event_name == 'schedule' && 'cron' || 'manual') }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AUDIT_TEST_ACCOUNT_PASSWORD: ${{ secrets.AUDIT_TEST_ACCOUNT_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_SHA: ${{ github.sha }}
        run: npx playwright test --config playwright.audit.config.ts

      # Emit a GitHub annotation + step summary so warn-only failures stay
      # loudly visible on the Actions UI even while we don't block on them.
      - name: Surface audit verdict
        if: steps.health.outcome == 'success' && always()
        run: |
          if [ "${{ steps.e2e.outcome }}" = "success" ]; then
            echo "::notice::Audit E2E passed"
            echo "### ✅ Audit E2E: PASS" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Audit E2E failed (warn-only gate — see audit_runs table + digest email)"
            echo "### ⚠️ Audit E2E: FAIL (warn-only)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "The audit agent reported a failure. This is currently non-blocking while we build a baseline." >> "$GITHUB_STEP_SUMMARY"
            echo "Investigate via the audit_runs table or the daily digest email." >> "$GITHUB_STEP_SUMMARY"
          fi

      # Only upload on failure. On green runs we write nothing — keeps us well
      # under GitHub Free's 500 MB artifact quota. continue-on-error ensures a
      # storage-quota hiccup here never turns a passing audit red.
      - name: Upload Playwright artifacts
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: audit-artifacts-${{ github.run_id }}
          path: |
            audit-artifacts/
            audit-results.json
          retention-days: 2
